name: Emscripten
on:
  push:
    branches: ['**']
  pull_request:
  workflow_call:

concurrency:
  group: emscripten-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Emscripten wasm32
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Configure
        run: >
          emcmake cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp build/iowolfet.wasm32.html artifact/
          cp build/iowolfet.wasm32.js artifact/
          cp build/iowolfet.wasm32.wasm artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iortcw-emscripten-wasm32
          path: artifact/
